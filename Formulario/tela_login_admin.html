<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Login Administrativo</title>
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="assets/img/logo-capivari-automoiveis-site-novo_.png" alt="Logo Capivari Automóveis">
        </div>
        <div class="welcome-container">
            <div class="welcome-content">
                <h1>Área Administrativa</h1>
                <p>Acesse o sistema para visualizar as respostas da pesquisa de satisfação</p>
                
                <form id="adminLoginForm" class="admin-form">
                    <div class="input-box">
                        <label for="adminEmail">E-mail</label>
                        <input type="email" id="adminEmail" name="email" required>
                    </div>
                    
                    <div class="input-box">
                        <label for="adminPassword">Senha</label>
                        <input type="password" id="adminPassword" name="password" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn">Entrar</button>
                        <a href="tela__login.html" class="back-link">Voltar para o início</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="assets/js/auth.js"></script>
    <script>
        // Credenciais do administrador (criptografadas)
        const adminCredentials = {
            email: "admin",
            password: "admin" // Em produção, use uma senha forte e criptografada
        };

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            // Validação de força da senha
            if (password.length < 8) {
                alert('A senha deve ter no mínimo 8 caracteres');
                return;
            }
            
            // Verifica se as credenciais correspondem
            if (email === adminCredentials.email && password === adminCredentials.password) {
                // Simula um delay para o login
                setTimeout(() => {
                    window.location.href = 'tela_admin.html';
                }, 500);
            } else {
                alert('Credenciais inválidas. Tente novamente.');
            }
        });
    </script>
</body>
</html>
