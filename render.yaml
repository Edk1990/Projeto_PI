services:
  - type: web
    name: capivari-pesquisa
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: capivari-db
          property: connectionString

databases:
  - name: capivari-db
    databaseName: pesquisa
    user: pesquisa_user
