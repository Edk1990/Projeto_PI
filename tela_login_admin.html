<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="assets/img/logo-capivari-automoiveis-site-novo_.png" alt="Logo Capivari Automóveis">
        </div>
        <div class="welcome-container">
            <div class="welcome-content">
                <h1>Área Administrativa</h1>
                <p>Acesse o sistema para visualizar as respostas da pesquisa de satisfação</p>
                
                <form id="adminLoginForm" class="admin-form">
                    <div class="input-box">
                        <label for="adminEmail">E-mail</label>
                        <input type="email" id="adminEmail" name="email" required>
                    </div>
                    
                    <div class="input-box">
                        <label for="adminPassword">Senha</label>
                        <input type="password" id="adminPassword" name="password" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn">Entrar</button>
                        <a href="tela__login.html" class="back-link">Voltar para o início</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('adminLoginForm');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const email = document.getElementById('adminEmail').value;
                    const password = document.getElementById('adminPassword').value;
                    
                    try {
                        const response = await fetch('/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ email, password })
                        });

                        if (response.ok) {
                            window.location.href = 'dashboard_admin.html';
                        } else {
                            const error = await response.json();
                            alert(error.message || 'Credenciais inválidas. Tente novamente.');
                        }
                    } catch (error) {
                        console.error('Erro na requisição:', error);
                        alert('Erro ao tentar fazer login. Por favor, tente novamente.');
                    }
                });
            } else {
                console.error('Formulário não encontrado');
            }
        });
    </script>
</body>
</html>
