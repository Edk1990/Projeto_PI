<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador | VW Capivari</title>
    
    <link rel="stylesheet" href="assets/css/survey-style.css">
</head>
<body>
    <main class="container" style="max-width: 450px;">
        
        <header class="form-header">
            <a href="tela_login.html" style="align-self: flex-start; margin-bottom: 10px; color: var(--accent-color); text-decoration: none; font-weight: 600;">&larr; Voltar ao Início</a>
            
            <div class="form-image">
                <img src="assets/img/logo-capivari-automoiveis-site-novo_.png" alt="Logo Volkswagen Capivari">
            </div>
            <h1 class="form-title">Acesso Restrito</h1>
            <p>Área exclusiva para administradores</p>
        </header>

        <form id="adminLoginForm">
            <div id="errorMessage" class="error-message"></div>

            <div class="form-section" style="margin-bottom: 1.5rem; padding-bottom: 0;">
                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                    
                    <div>
                        <label for="adminEmail" class="main-label" style="font-size: 0.95rem; margin-bottom: 0.4rem;">E-mail Administrativo</label>
                        <input type="email" id="adminEmail" name="email" required placeholder="admin@vwcapivari.com.br" autocomplete="email">
                    </div>
                    
                    <div>
                        <label for="adminPassword" class="main-label" style="font-size: 0.95rem; margin-bottom: 0.4rem;">Senha de Acesso</label>
                        <input type="password" id="adminPassword" name="password" required placeholder="••••••••" autocomplete="current-password">
                    </div>

                </div>
            </div>

            <button type="submit" class="submit-button" id="submitBtn">Acessar Painel</button>
        </form>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('adminLoginForm');
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    // Esconde o erro anterior (se houver)
                    errorDiv.style.display = 'none';
                    errorDiv.textContent = '';
                    
                    const email = document.getElementById('adminEmail').value;
                    const password = document.getElementById('adminPassword').value;
                    
                    // UX FEEDBACK: Muda o botão para mostrar que está processando
                    const originalBtnText = submitBtn.textContent;
                    submitBtn.textContent = 'Autenticando...';
                    submitBtn.style.opacity = '0.7';
                    submitBtn.disabled = true; // Impede que o usuário clique 2x seguidas

                    try {
                        const response = await fetch('/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ email, password })
                        });

                        if (response.ok) {
                            // Sucesso! Redireciona para o painel
                            window.location.href = 'dashboard_admin.html';
                        } else {
                            // Falha na senha
                            const error = await response.json();
                            showError(error.message || 'Credenciais inválidas. Tente novamente.');
                        }
                    } catch (error) {
                        // Erro de servidor/internet
                        console.error('Erro na requisição:', error);
                        showError('Erro de conexão. Verifique sua internet e tente novamente.');
                    } finally {
                        // UX FEEDBACK: Restaura o botão ao normal
                        submitBtn.textContent = originalBtnText;
                        submitBtn.style.opacity = '1';
                        submitBtn.disabled = false;
                    }
                });
            }

            // Função para exibir a mensagem de erro com a nossa animação "Shake"
            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                
                // Truque avançado de JS: Remove e re-adiciona a animação para ela rodar sempre que errar
                errorDiv.style.animation = 'none';
                errorDiv.offsetHeight; // Força a renderização
                errorDiv.style.animation = null; 
            }
        });
    </script>
</body>
</html>
