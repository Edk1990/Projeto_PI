<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - Volkswagen Capivari</title>
    
    <link rel="stylesheet" href="assets/css/survey-style.css">
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const progressBar = document.querySelector('.progress-bar');
            const submitButton = document.querySelector('button[type="submit"]');
            
            // Seletores mapeados exatamente com os 'names' do HTML
            const emailInput = document.querySelector('input[name="email"]');
            const dateInput = document.querySelector('input[name="data_visita"]');
            const plateInput = document.querySelector('input[name="plate"]');
            const consultantInput = document.querySelector('input[name="consultant"]');
            const reasonSelect = document.querySelector('select[name="motivo_visita"]');
            const resolvedRadios = document.querySelectorAll('input[name="resolved"]');
            const unresolvedReason = document.querySelector('input[name="unresolved_reason"]');
            const suggestions = document.querySelector('textarea[name="suggestions"]');
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            form.insertBefore(errorDiv, form.firstChild);

            // ==========================================
            // MÁSCARAS DE INPUT
            // ==========================================

            // Máscara de Data (DD/MM/AAAA)
            if (dateInput) {
                dateInput.addEventListener('input', function(e) {
                    let v = e.target.value.replace(/\D/g, ''); 
                    if (v.length > 2) v = v.replace(/^(\d{2})(\d)/, '$1/$2'); 
                    if (v.length > 5) v = v.replace(/^(\d{2})\/(\d{2})(\d)/, '$1/$2/$3'); 
                    e.target.value = v.substring(0, 10); 
                    updateProgress();
                });
            }

            // Máscara de Placa (Mercosul e Antiga)
            if (plateInput) {
                plateInput.addEventListener('input', function(e) {
                    let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); 
                    if (v.length > 3) {
                        v = v.replace(/^([A-Z]{3})([A-Z0-9]+)/, '$1-$2');
                    }
                    e.target.value = v.substring(0, 8); 
                    updateProgress();
                });
            }

            // ==========================================

            function updateProgress() {
                // Só atualiza se os campos existirem na tela para não quebrar o JS
                if (!dateInput || !plateInput || !consultantInput || !reasonSelect) return;

                const requiredFields = [
                    dateInput.value.length === 10, 
                    plateInput.value.length === 8, 
                    consultantInput.value,
                    reasonSelect.value,
                    (resolvedRadios[0] && resolvedRadios[0].checked) || (resolvedRadios[1] && resolvedRadios[1].checked)
                ];
                const filledFields = requiredFields.filter(field => field).length;
                const progress = (filledFields / requiredFields.length) * 100;
                progressBar.style.width = progress + '%';
            }

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function validateDate(dateStr) {
                const re = /^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[012])\/\d{4}$/;
                return re.test(dateStr);
            }

            function validatePlate(plate) {
                const re = /^[A-Z]{3}-[0-9][A-Z0-9][0-9]{2}$/;
                return re.test(plate);
            }

            form.addEventListener('input', updateProgress);

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                let isValid = true;
                errorDiv.textContent = '';
                errorDiv.style.display = 'none';

                if (!validateDate(dateInput.value)) {
                    errorDiv.textContent += 'Data inválida. Use o formato DD/MM/AAAA.\n';
                    isValid = false;
                }

                if (emailInput.value && !validateEmail(emailInput.value)) {
                    errorDiv.textContent += 'E-mail inválido.\n';
                    isValid = false;
                }

                if (!validatePlate(plateInput.value)) {
                    errorDiv.textContent += 'Placa inválida. Verifique o formato.\n';
                    isValid = false;
                }

                if (resolvedRadios[1].checked && !unresolvedReason.value.trim()) {
                    errorDiv.textContent += 'Por favor, descreva os problemas não resolvidos.\n';
                    isValid = false;
                }

                if (!isValid) {
                    errorDiv.style.display = 'block';
                    errorDiv.style.animation = 'none';
                    errorDiv.offsetHeight;
                    errorDiv.style.animation = null; 
                    return;
                }

                const originalBtnText = submitButton.textContent;
                submitButton.textContent = 'Enviando...';
                submitButton.disabled = true;

                try {
                    const formData = new FormData(form);
                    const response = await fetch('/submit', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        window.location.href = 'tela_agradecimento_.html';
                    } else {
                        const error = await response.json();
                        errorDiv.textContent = error.error || 'Erro ao enviar formulário';
                        errorDiv.style.display = 'block';
                        submitButton.textContent = originalBtnText;
                        submitButton.disabled = false;
                    }
                } catch (error) {
                    errorDiv.textContent = 'Erro de conexão. Por favor, tente novamente.';
                    errorDiv.style.display = 'block';
                    submitButton.textContent = originalBtnText;
                    submitButton.disabled = false;
                }
            });

            // Chama a barra de progresso pela primeira vez
            updateProgress();
        });
    </script>
</head>
<body>
    <div class="container">
        
        <div class="form-header">
            <a href="tela_login.html" style="align-self: flex-start; margin-bottom: 10px; color: var(--accent-color); text-decoration: none; font-weight: 600;">&larr; Voltar</a>
            <div class="form-image">
                <img src="assets/img/logo-capivari-automoiveis-site-novo_.png" alt="Logo Volkswagen Capivari">
            </div>
            <h1 class="form-title">Pesquisa de Satisfação</h1>
            <p>Volkswagen Capivari</p>
        </div>

        <form id="survey-form">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="form-section">
                <h3 class="main-label">Dados do Cliente</h3>
                <div style="display: flex; flex-direction: column; gap: 0.85rem;">
                    
                    <input type="text" name="data_visita" required placeholder="Data do Atendimento" inputmode="numeric" maxlength="10">
                    <input type="text" name="plate" placeholder="Placa do Veículo" required maxlength="8">
                    <input type="text" name="consultant" placeholder="Nome do Consultor" required>
                    <input type="email" name="email" placeholder="E-mail (Opcional)" inputmode="email">
                
                </div>
            </div>

            <div class="form-section">
                <h3 class="main-label" style="font-size: 1.25rem; margin-bottom: 0.5rem;">Perguntas sobre o Atendimento</h3>
                <p style="margin-bottom: 1.5rem; color: var(--text-secondary); font-size: 0.95rem;">Estamos dispostos a sempre aprimorar nosso atendimento...</p>

                <div class="question-group" style="margin-bottom: 1.5rem;">
                    <label class="main-label">1 - Qual foi o motivo da sua vinda até a nossa loja?</label>
                    <select name="motivo_visita" required>
                        <option value="">Selecione o motivo...</option>
                        <option value="Garantia">Garantia</option>
                        <option value="Manutenção programada">Manutenção programada</option>
                        <option value="Manutenção sem garantia">Manutenção/Reparo sem garantia</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <div class="question-group" style="margin-bottom: 1.5rem;">
                    <label class="main-label">2 - Todos os problemas ou dúvidas foram corrigidos/sanados?</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="resolved" value="Sim" required> Sim
                        </label>
                        <label>
                            <input type="radio" name="resolved" value="Não"> Não
                        </label>
                    </div>
                    <div class="unresolved-section">
                        <input type="text" name="unresolved_reason" placeholder="Se respondeu 'Não', descreva o que faltou..." style="margin-top: 0.5rem;">
                    </div>
                </div>

                <div class="question-group" style="margin-bottom: 1.5rem;">
                    <label class="main-label">3 - Qual a probabilidade de você voltar a utilizar nossos serviços?</label>
                    <select name="probability" required>
                        <option value="">Selecione a probabilidade...</option>
                        <option value="100">100% - Com certeza voltarei</option>
                        <option value="75">75% - Provavelmente voltarei</option>
                        <option value="50">50% - Talvez</option>
                        <option value="25">25% - Pouca chance</option>
                        <option value="0">0% - Não voltarei</option>
                    </select>
                </div>

                <div class="question-group">
                    <label class="main-label">4 - Alguma sugestão para melhorarmos?</label>
                    <textarea name="suggestions" rows="4" placeholder="Descreva em poucas palavras..." required></textarea>
                </div>
            </div>

            <button type="submit" class="submit-button">Enviar Resposta</button>
        </form>
    </div>
</body>
</html>
